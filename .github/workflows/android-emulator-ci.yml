name: Android Emulator CI

# Heavier device-backed checks (instrumented UI tests, Maestro flows, the
# startup macrobenchmark). Emulator boots are slow/flaky, so this runs on pushes
# to main (post-merge validation) and on manual dispatch rather than gating every
# PR — once it's proven stable it can be added to the pull_request trigger.
on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: emulator-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  emulator:
    name: Instrumented + Maestro + macrobenchmark
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Builds token-free (default -Pt2wMapbox=false): the instrumented / Maestro /
    # macrobenchmark suites don't exercise the Mapbox Relive map, so the Mapbox SDK
    # (and its secret downloads token) isn't needed here. The real Mapbox compile is
    # validated in android-ci.yml.
    strategy:
      matrix:
        api-level: [ 34 ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Hardware acceleration for the emulator on the GitHub runner.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # One emulator boot runs everything. connectedDebugAndroidTest is the real
      # gate; the macrobenchmark (emulator numbers aren't release-grade) and the
      # Maestro flows (flow 03 needs a seeded backend) are informational.
      - name: Run device tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          script: |
            ./gradlew :app:connectedDebugAndroidTest --stacktrace
            ./gradlew :macrobenchmark:connectedBenchmarkAndroidTest \
              -Pandroid.testInstrumentationRunnerArguments.androidx.benchmark.suppressErrors=EMULATOR \
              --stacktrace || echo "::warning::macrobenchmark failed (emulator perf is informational)"
            ./gradlew :app:installDebug
            # Backend-free flows (auth gate + client-side navigation only). The
            # signed-in journeys (03 tabs, 06 admin/relive) need a seeded backend
            # and run manually — see .maestro/README.md.
            maestro test \
              .maestro/01_launch_to_login.yaml \
              .maestro/02_login_form_validation.yaml \
              .maestro/04_register_navigation.yaml \
              .maestro/05_forgot_password_navigation.yaml \
              || echo "::warning::Maestro flows failed (some require a seeded backend)"

      - name: Upload device-test reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: emulator-reports
          path: |
            app/build/reports/androidTests/
            macrobenchmark/build/outputs/
          if-no-files-found: ignore
