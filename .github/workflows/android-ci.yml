name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Unit tests + debug APK
    runs-on: ubuntu-latest
    # The unit-test / Paparazzi / assemble gate runs TOKEN-FREE (default
    # -Pt2wMapbox=false), so it needs no Mapbox secret and proves a fresh clone
    # builds. A separate guarded step below compiles the real Mapbox-backed Relive
    # map (-Pt2wMapbox=true) when MAPBOX_DOWNLOADS_TOKEN is configured. The public
    # runtime token stays optional (a debug build tolerates a blank one).
    env:
      ORG_GRADLE_PROJECT_MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Gradle wrapper validation + dependency/build caching.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # Pixel-exact Compose screenshot regression gate. Goldens were recorded on
      # Linux (this runner's platform), so they match here; a UI change that
      # alters rendering fails this until the goldens are re-recorded with
      # `./gradlew :app:recordPaparazziDebug`.
      - name: Verify screenshots (Paparazzi)
        run: ./gradlew :app:verifyPaparazziDebug --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      # Validate the REAL Mapbox-backed Relive map compiles (src/mapbox). Needs the
      # secret downloads token to resolve com.mapbox.maps:android; skipped with a
      # notice on forks / setups without it, so the gate above stays token-free.
      - name: Compile Mapbox Relive variant (if token available)
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
        run: |
          if [ -n "$MAPBOX_DOWNLOADS_TOKEN" ]; then
            ./gradlew :app:compileDebugKotlin -Pt2wMapbox=true --stacktrace
          else
            echo "::notice::MAPBOX_DOWNLOADS_TOKEN not set — skipping the real Mapbox compile check"
          fi

      # Artifact uploads are convenience outputs, not correctness gates — the
      # unit-test + assemble steps above are the real gate. GitHub's blob storage
      # occasionally drops the upload with ECONNRESET on FinalizeArtifact, which
      # must NOT red an otherwise-green build, so these steps are non-fatal.
      - name: Upload debug APK
        if: success()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload test + screenshot reports on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/reports/paparazzi/
          if-no-files-found: ignore
