name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Unit tests + debug APK
    runs-on: ubuntu-latest
    # Mapbox's Maps SDK (Relive 3D flyover) resolves from Mapbox's private Maven
    # repo, authenticated with a SECRET downloads token. Add it as a repo secret
    # named MAPBOX_DOWNLOADS_TOKEN (a token with the Downloads:Read scope) or the
    # build fails to resolve com.mapbox.maps:android with a 401. MAPBOX_ACCESS_TOKEN
    # (the public pk. runtime token) is optional here — a debug build tolerates a
    # blank runtime token. settings.gradle.kts reads the downloads token from the
    # environment; build.gradle.kts reads the runtime token as a Gradle property.
    env:
      MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
      ORG_GRADLE_PROJECT_MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Gradle wrapper validation + dependency/build caching.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # Pixel-exact Compose screenshot regression gate. Goldens were recorded on
      # Linux (this runner's platform), so they match here; a UI change that
      # alters rendering fails this until the goldens are re-recorded with
      # `./gradlew :app:recordPaparazziDebug`.
      - name: Verify screenshots (Paparazzi)
        run: ./gradlew :app:verifyPaparazziDebug --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      # Artifact uploads are convenience outputs, not correctness gates — the
      # unit-test + assemble steps above are the real gate. GitHub's blob storage
      # occasionally drops the upload with ECONNRESET on FinalizeArtifact, which
      # must NOT red an otherwise-green build, so these steps are non-fatal.
      - name: Upload debug APK
        if: success()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload test + screenshot reports on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/reports/paparazzi/
          if-no-files-found: ignore
