# Flow 5 — From login, reach the "Forgot password" reset flow and return.
#
# Client-side navigation: tapping "Forgot password?" on LoginScreen pushes
# ForgotPasswordScreen, whose first step asks for the account email to send a
# reset code. Rendering that step needs no backend, so this runs in the CI
# emulator gate. Text-based assertions survive restyles.
appId: com.taleson2wheels.app
---
- clearState
- launchApp
- assertVisible: "Sign in"

# Go to the password-reset flow.
- tapOn: "Forgot password?"

# ForgotPasswordScreen step 1 (email → reset code). "Back to sign in" is the
# screen's own return affordance and is distinct to this flow.
- assertVisible: "Email"
- assertVisible: "Send code"
- assertVisible: "Back to sign in"

- tapOn: "Email"
- inputText: "rider@example.com"
- hideKeyboard

# Use the screen's own "Back to sign in" affordance to return.
- tapOn: "Back to sign in"
- assertVisible: "Sign in"
- assertVisible: "Forgot password?"
